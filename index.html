<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I luv u na 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight, 600);
  cvs.width = size;
  cvs.height = size;
}
resize();
window.addEventListener('resize', () => { resize(); });

function getSize() { return cvs.width; }

// Heart parametric — centered, scaled to canvas
function heartPt(t, size) {
  const cx = size / 2;
  const cy = size / 2 - size * 0.05;
  const S = size * 0.30;
  return [
    cx + 16 * Math.pow(Math.sin(t), 3) * (S / 16),
    cy - (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * (S / 14)
  ];
}

// Pre-sample perimeter with arc lengths
function buildPerimeter(size) {
  const N = 3000;
  const pts = [];
  for (let i = 0; i < N; i++) pts.push(heartPt((i / N) * Math.PI * 2, size));
  const arcLen = [0];
  for (let i = 1; i < N; i++) {
    const dx = pts[i][0]-pts[i-1][0], dy = pts[i][1]-pts[i-1][1];
    arcLen.push(arcLen[i-1] + Math.hypot(dx, dy));
  }
  const totalLen = arcLen[N-1];
  function ptAtDist(d) {
    d = ((d % totalLen) + totalLen) % totalLen;
    let lo = 0, hi = N - 1;
    while (lo < hi - 1) { const m = (lo+hi)>>1; arcLen[m] <= d ? lo=m : hi=m; }
    const t = (d - arcLen[lo]) / (arcLen[hi] - arcLen[lo]);
    return [pts[lo][0]*(1-t)+pts[hi][0]*t, pts[lo][1]*(1-t)+pts[hi][1]*t];
  }
  return { ptAtDist, totalLen };
}

const ANGLE = 30 * Math.PI / 180;
const phrases = ['I  luv u na', 'luv na aun'];
const LINE_SPACING = 15; // arc distance between line start points
const SPEED = 18;        // pixels per second along perimeter

// Each line: { dist0: initial arc offset, phraseIdx }
let lines = [];
let perim = null;
let lastSize = 0;

function initLines(totalLen) {
  lines = [];
  const count = Math.floor(totalLen / LINE_SPACING);
  for (let i = 0; i < count; i++) {
    lines.push({
      dist0: i * LINE_SPACING,
      phraseIdx: i
    });
  }
}

let lastTime = null;
let elapsed = 0;

function draw(ts) {
  requestAnimationFrame(draw);
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;
  elapsed += dt;

  const size = getSize();

  // Rebuild perimeter if size changed
  if (size !== lastSize) {
    lastSize = size;
    perim = buildPerimeter(size);
    initLines(perim.totalLen);
  }

  const { ptAtDist, totalLen } = perim;
  const moved = elapsed * SPEED; // total arc distance moved so far

  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, size, size);

  const cy = size/2 - size*0.05;
  const S = size * 0.30;

  for (const line of lines) {
    const d = (line.dist0 + moved) % totalLen;
    const [sx, sy] = ptAtDist(d);

    // Depth: lower on canvas = brighter/bigger
    const normY = Math.max(0, Math.min(1, (sy - (cy - S*1.3)) / (S * 2.6)));
    const alpha = 0.35 + 0.65 * normY;
    const fs = Math.round(size * 0.016 + size * 0.008 * normY);
    const phrase = phrases[line.phraseIdx % 2];

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(ANGLE);
    ctx.font = `bold ${fs}px 'Courier New', monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255, 100, 190, 0.9)';
    ctx.shadowBlur = 3 + 8 * normY;
    ctx.fillStyle = `rgba(255, 185, 228, ${alpha})`;
    ctx.fillText(phrase, 0, 0);
    ctx.restore();
  }

  // Soft center glow
  const grd = ctx.createRadialGradient(size/2, cy, size*0.02, size/2, cy, size*0.35);
  grd.addColorStop(0, 'rgba(180,0,80,0.08)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
